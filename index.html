<script>
const JSON_URL = "videos.json";
const DIRECT_LINK = "https://crn77.com/4/10960953";

const video = document.getElementById("player");
const title = document.getElementById("title");

let clicked = false;
let redirected = false;

// ambil video
fetch(JSON_URL)
.then(res => res.json())
.then(data => {
  const vids = data.videos;

  const slug = decodeURIComponent(location.hash.replace("#/", ""));

  let selected = slug
    ? vids.find(v => v.slug === slug)
    : null;

  if (!selected)
    selected = vids[Math.floor(Math.random() * vids.length)];

  video.src = selected.cdn;
  title.innerText = selected.slug;
});

// 1 klik pertama doang (lebih akurat dari play)
video.addEventListener("click", () => {
  if (!clicked) {
    clicked = true;
    window.location.href = DIRECT_LINK;
  }
}, { once: true });

// auto 30 detik (backup)
video.addEventListener("timeupdate", () => {
  if (!redirected && video.currentTime >= 30){
    redirected = true;
    window.location.href = DIRECT_LINK;
  }
});
</script>
