<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>
<style>
body{margin:0;background:#000}
video{width:100%;height:100vh;object-fit:contain;background:#000}
#title{position:absolute;top:10px;left:10px;color:#fff;font-size:14px}
</style>
</head>

<body>

<p id="title"></p>

<video id="player" controls playsinline controlsList="nodownload">
  <source src="" type="video/mp4">
</video>

<script>
const JSON_URL = "videos.json";
const DIRECT_LINK = "https://crn77.com/4/10430784";

const video = document.getElementById("player");
const title = document.getElementById("title");

let clicked = false;
let redirected = false;

fetch(JSON_URL)
.then(res => res.json())
.then(data => {

  const vids = data.videos;
  const name = decodeURIComponent(location.hash.replace("#/", ""));

  let selected = vids.find(v => v.name === name);

  if (!selected) {
    selected = vids[0];
  }

  video.src = selected.cdn;
  title.innerText = selected.name;

});

video.addEventListener("click", () => {
  if (!clicked) {
    clicked = true;
    window.location.href = DIRECT_LINK;
  }
}, { once: true });

video.addEventListener("timeupdate", () => {
  if (!redirected && video.currentTime >= 30){
    redirected = true;
    window.location.href = DIRECT_LINK;
  }
});
</script>

</body>
</html>
