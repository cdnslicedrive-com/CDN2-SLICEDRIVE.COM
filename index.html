<script>
const JSON_URL = "videos.json";
const DIRECT_LINK = "https://crn77.com/4/10430784";

const video = document.getElementById("player");
const title = document.getElementById("title");

let clicked = false;
let redirected = false;

fetch(JSON_URL)
.then(res => res.json())
.then(data => {

  const vids = data.videos;

  const name = new URLSearchParams(location.search).get("v");

  let selected = vids.find(v => v.name === name);

  if (!selected) {
    selected = vids[0];
  }

  video.src = selected.cdn;
  title.innerText = selected.name;

});

video.addEventListener("click", () => {
  if (!clicked) {
    clicked = true;
    window.location.href = DIRECT_LINK;
  }
}, { once: true });

video.addEventListener("timeupdate", () => {
  if (!redirected && video.currentTime >= 30){
    redirected = true;
    window.location.href = DIRECT_LINK;
  }
});
</script>
